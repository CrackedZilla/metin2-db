<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobi — Metin2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0f; --surface:#0d1117; --surface2:#1a212b;
  --border:rgba(255,255,255,0.08); --border-hover:rgba(0,200,255,0.5);
  --accent:#00c8ff; --accent-dim:rgba(0,200,255,0.12);
  --text:#f0f3f6; --text-soft:#c9d1d9; --text-muted:#9aa5b1; --text-dim:#4a5568;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; min-height:100vh; background-image:radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,200,255,0.06), transparent); -webkit-font-smoothing:antialiased; }
nav { position:sticky; top:0; z-index:100; background:rgba(8,10,15,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; height:56px; gap:6px; }
.nav-logo { font-size:16px; font-weight:700; color:#fff; margin-right:12px; display:flex; align-items:center; gap:6px; letter-spacing:-0.3px; }
.nav-logo span { color:var(--accent); }
.nav-sep { width:1px; height:16px; background:var(--border); margin:0 6px; }
.nav-link { padding:5px 12px; border-radius:6px; color:var(--text-soft); text-decoration:none; font-size:13px; font-weight:500; transition:all 0.15s; border:1px solid transparent; }
.nav-link:hover { color:var(--text); background:var(--surface2); }
.nav-link.active { color:var(--accent); background:var(--accent-dim); border-color:rgba(0,200,255,0.25); }
.nav-spacer { flex:1; }
.lang-toggle { display:flex; gap:2px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:2px; }
.lang-btn { padding:4px 12px; border:none; border-radius:4px; background:transparent; color:var(--text-soft); cursor:pointer; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.5px; transition:all 0.2s; }
.lang-btn.active { background:var(--accent); color:#000; }
.search-section { padding:20px 24px 16px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:12px; }
.search-wrap { position:relative; flex:1; max-width:440px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; font-size:13px; }
.search-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 14px 9px 36px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; outline:none; transition:all 0.2s; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,200,255,0.1); }
.search-input::placeholder { color:var(--text-dim); }
.count-badge { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); padding:5px 10px; border-radius:6px; white-space:nowrap; }
.count-badge b { color:var(--accent); }
.hint { font-size:12px; color:var(--text-muted); margin-left:auto; display:flex; align-items:center; gap:5px; }
.hint kbd { font-family:'JetBrains Mono',monospace; font-size:10px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 6px; color:var(--text-soft); }
main { padding:20px 24px 48px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:6px; }
.mob-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; transition:border-color 0.12s, background 0.12s, transform 0.08s; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
.mob-card:hover { border-color:var(--border-hover); background:var(--surface2); }
.mob-card:active { transform:scale(0.97); }
.mob-card.copied { border-color:var(--accent); background:var(--accent-dim); }
.mob-vnum { font-family:'JetBrains Mono',monospace; font-size:10px; color:#000; background:var(--accent); padding:2px 7px; border-radius:4px; white-space:nowrap; flex-shrink:0; font-weight:600; }
.mob-name { font-size:13px; font-weight:500; color:var(--text-soft); line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mob-card:hover .mob-name { color:var(--text); }
.sentinel { height:1px; }
.no-results { text-align:center; padding:80px 20px; color:var(--text-muted); }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--accent); color:#000; font-weight:600; font-size:13px; padding:10px 20px; border-radius:8px; box-shadow:0 8px 24px rgba(0,200,255,0.3); transition:transform 0.3s cubic-bezier(0.2,0.9,0.3,1.2); z-index:200; font-family:'JetBrains Mono',monospace; }
.toast.show { transform:translateX(-50%) translateY(0); }
mark { background:rgba(0,200,255,0.25); color:var(--accent); border-radius:2px; padding:0 1px; }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">⚔ Metin2<span>DB</span></div>
  <div class="nav-sep"></div>
  <a href="index.html" class="nav-link">GM Comenzi</a>
  <a href="items.html" class="nav-link">🎒 Iteme</a>
  <a href="mobs.html" class="nav-link active">👾 Mobi</a>
  <div class="nav-spacer"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ro')" id="btn-ro">RO</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
  </div>
</nav>
<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="search" placeholder="Caută după nume sau VNUM..." oninput="onSearch()" />
  </div>
  <div class="count-badge">Afișate: <b id="shown">0</b> / <b id="total">0</b></div>
  <div class="hint">Click pe mob = copiază <kbd>/mob vnum</kbd></div>
</div>
<main>
  <div class="grid" id="grid"></div>
  <div class="sentinel" id="sentinel"></div>
  <div id="no-results" class="no-results" style="display:none">Niciun mob găsit.</div>
</main>
<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script>
const CHUNK=100; let filtered=[],shown=0,lang='ro',searchTimer=null,q='';
const grid=document.getElementById('grid');
const shownEl=document.getElementById('shown');
document.getElementById('total').textContent=MOBS.length;

function esc(s){return s.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function highlight(name){ if(!q) return esc(name); const i=name.toLowerCase().indexOf(q); if(i<0) return esc(name); return esc(name.slice(0,i))+'<mark>'+esc(name.slice(i,i+q.length))+'</mark>'+esc(name.slice(i+q.length)); }

function setLang(l){lang=l;document.getElementById('btn-ro').classList.toggle('active',l==='ro');document.getElementById('btn-en').classList.toggle('active',l==='en');document.getElementById('search').placeholder=l==='ro'?'Caută după nume sau VNUM...':'Search by name or VNUM...';document.getElementById('no-results').textContent=l==='ro'?'Niciun mob găsit.':'No mobs found.';doFilter();}
function onSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(doFilter,120);}
function doFilter(){q=document.getElementById('search').value.toLowerCase().trim();const k=lang==='ro'?'name_ro':'name_en';filtered=q?MOBS.filter(m=>m[k].toLowerCase().includes(q)||String(m.vnum).includes(q)):MOBS;shown=0;grid.innerHTML='';shownEl.textContent=filtered.length;document.getElementById('no-results').style.display=filtered.length?'none':'block';loadMore();}
function loadMore(){
  const k=lang==='ro'?'name_ro':'name_en';
  const end=Math.min(shown+CHUNK,filtered.length);
  let html='';
  for(let i=shown;i<end;i++){html+='<div class="mob-card" data-vnum="'+filtered[i].vnum+'"><span class="mob-vnum">'+filtered[i].vnum+'</span><span class="mob-name">'+highlight(filtered[i][k])+'</span></div>';}
  grid.insertAdjacentHTML('beforeend',html);
  shown=end;
}
grid.addEventListener('click',e=>{const c=e.target.closest('.mob-card');if(!c)return;const v=c.dataset.vnum;navigator.clipboard.writeText('/mob '+v);c.classList.add('copied');setTimeout(()=>c.classList.remove('copied'),600);showToast('/mob '+v+' copiat!');});
function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400);}
const io=new IntersectionObserver(es=>{if(es[0].isIntersecting&&shown<filtered.length)loadMore();},{rootMargin:'400px'});
io.observe(document.getElementById('sentinel'));
filtered=MOBS;shownEl.textContent=filtered.length;loadMore();
</script>
</body>
</html>
