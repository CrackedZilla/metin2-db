<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobi — Metin2</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --bg2: #0f1218; --bg3: #151a22;
    --border: #1e2a3a; --accent: #e8a020;
    --text: #c8d8e8; --text-dim: #5a7090;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }
  header {
    background: linear-gradient(180deg, #0d1420 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #c06010);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .logo-text { font-size: 22px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; }
  .logo-sub { font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .nav-links { display: flex; gap: 8px; }
  .nav-link {
    padding: 8px 16px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim); text-decoration: none;
    font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
  }
  .nav-link:hover { color: var(--text); border-color: var(--accent); }
  .nav-link.active { color: var(--accent); border-color: var(--accent); background: rgba(232,160,32,0.08); }
  .lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .lang-btn {
    padding: 8px 18px; background: transparent; border: none;
    color: var(--text-dim); cursor: pointer; font-family: 'Rajdhani', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 2px; transition: all 0.2s;
  }
  .lang-btn.active { background: var(--accent); color: #000; }
  .lang-btn:hover:not(.active) { background: var(--bg3); color: var(--text); }
  .search-bar {
    padding: 20px 40px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  .search-wrapper { position: relative; flex: 1; max-width: 500px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  .search-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 16px 10px 42px;
    color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }
  .stats { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .stats span { color: var(--accent); }
  main { padding: 24px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .mob-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 16px; transition: all 0.15s;
    display: flex; align-items: center; gap: 12px;
  }
  .mob-card:hover { border-color: rgba(232,160,32,0.4); background: var(--bg3); }
  .mob-vnum-badge {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: #000; background: var(--accent); padding: 3px 7px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
  }
  .mob-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .no-results { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 15px; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 32px 0 48px; flex-wrap: wrap; }
  .page-btn {
    padding: 7px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim); cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.15s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--text); }
  .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">⚔</div>
    <div>
      <div class="logo-text">Baza de Date</div>
      <div class="logo-sub">Metin2 Private Server</div>
    </div>
  </div>
  <div class="header-right">
    <div class="nav-links">
      <a href="index.html" class="nav-link">GM Comenzi</a>
      <a href="items.html" class="nav-link">🎒 Iteme</a>
      <a href="mobs.html" class="nav-link active">👾 Mobi</a>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ro')" id="btn-ro">RO</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    </div>
  </div>
</header>
<div class="search-bar">
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="search" placeholder="Caută după nume sau VNUM..." oninput="onSearch()" />
  </div>
  <div class="stats">Afișate: <span id="shown">0</span> / <span id="total">0</span></div>
</div>
<main>
  <div class="grid" id="grid"></div>
  <div id="no-results" class="no-results" style="display:none">Niciun mob găsit.</div>
  <div class="pagination" id="pagination"></div>
</main>
<script src="data.js"></script>
<script>
const PAGE_SIZE = 120;
let filtered = [];
let page = 0;
let lang = 'ro';

document.getElementById('total').textContent = MOBS.length;

function setLang(l) {
  lang = l;
  document.getElementById('btn-ro').classList.toggle('active', l === 'ro');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('search').placeholder = l === 'ro' ? 'Caută după nume sau VNUM...' : 'Search by name or VNUM...';
  document.getElementById('no-results').textContent = l === 'ro' ? 'Niciun mob găsit.' : 'No mobs found.';
  onSearch();
}

function onSearch() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const nameKey = lang === 'ro' ? 'name_ro' : 'name_en';
  filtered = q
    ? MOBS.filter(m => m[nameKey].toLowerCase().includes(q) || String(m.vnum).includes(q))
    : MOBS;
  page = 0;
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');
  const shownEl = document.getElementById('shown');
  const pagDiv = document.getElementById('pagination');
  const nameKey = lang === 'ro' ? 'name_ro' : 'name_en';

  if (filtered.length === 0) {
    grid.innerHTML = ''; noRes.style.display = 'block'; pagDiv.innerHTML = '';
    shownEl.textContent = 0; return;
  }
  noRes.style.display = 'none';
  const slice = filtered.slice(page * PAGE_SIZE, page * PAGE_SIZE + PAGE_SIZE);
  shownEl.textContent = filtered.length;

  grid.innerHTML = slice.map(m => `
    <div class="mob-card">
      <span class="mob-vnum-badge">${m.vnum}</span>
      <span class="mob-name">${m[nameKey]}</span>
    </div>
  `).join('');

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) { pagDiv.innerHTML = ''; return; }
  let btns = `<button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>← Prev</button>`;
  const range = [];
  for (let i = 0; i < totalPages; i++) {
    if (i===0||i===totalPages-1||Math.abs(i-page)<=2) range.push(i);
    else if (range[range.length-1]!=='...') range.push('...');
  }
  range.forEach(p => {
    if (p==='...') btns+=`<span style="color:var(--text-dim);padding:0 4px">…</span>`;
    else btns+=`<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p+1}</button>`;
  });
  btns+=`<button class="page-btn" onclick="goPage(${page+1})" ${page===totalPages-1?'disabled':''}>Next →</button>`;
  pagDiv.innerHTML = btns;
}

function goPage(p) { page = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

filtered = MOBS;
render();
</script>
</body>
</html>
