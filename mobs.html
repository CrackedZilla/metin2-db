<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobi — Metin2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0f; --surface:#0d1117; --surface2:#161b22;
  --border:rgba(255,255,255,0.07); --border-hover:rgba(0,200,255,0.35);
  --accent:#00c8ff; --accent-dim:rgba(0,200,255,0.12);
  --text:#e6edf3; --text-muted:#7d8590; --text-dim:#30363d;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; min-height:100vh; background-image:radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,200,255,0.05), transparent); }
nav { position:sticky; top:0; z-index:100; background:rgba(8,10,15,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; height:56px; gap:6px; }
.nav-logo { font-size:16px; font-weight:700; color:#fff; margin-right:12px; display:flex; align-items:center; gap:6px; letter-spacing:-0.3px; }
.nav-logo span { color:var(--accent); }
.nav-sep { width:1px; height:16px; background:var(--border); margin:0 6px; }
.nav-link { padding:5px 12px; border-radius:6px; color:var(--text-muted); text-decoration:none; font-size:13px; font-weight:500; transition:all 0.15s; border:1px solid transparent; }
.nav-link:hover { color:var(--text); background:var(--surface2); }
.nav-link.active { color:var(--accent); background:var(--accent-dim); border-color:rgba(0,200,255,0.2); }
.nav-spacer { flex:1; }
.lang-toggle { display:flex; gap:2px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:2px; }
.lang-btn { padding:4px 12px; border:none; border-radius:4px; background:transparent; color:var(--text-muted); cursor:pointer; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.5px; transition:all 0.2s; }
.lang-btn.active { background:var(--accent); color:#000; }
.search-section { padding:20px 24px 16px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:12px; }
.search-wrap { position:relative; flex:1; max-width:440px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; font-size:13px; }
.search-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 14px 9px 36px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; outline:none; transition:all 0.2s; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,200,255,0.08); }
.search-input::placeholder { color:var(--text-dim); }
.count-badge { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); padding:5px 10px; border-radius:6px; white-space:nowrap; }
.count-badge b { color:var(--accent); }
main { padding:20px 24px 48px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:6px; }
.mob-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; transition:all 0.15s; display:flex; align-items:center; gap:10px; }
.mob-card:hover { border-color:var(--border-hover); background:var(--surface2); }
.mob-vnum { font-family:'JetBrains Mono',monospace; font-size:10px; color:#000; background:var(--accent); padding:2px 7px; border-radius:4px; white-space:nowrap; flex-shrink:0; font-weight:600; }
.mob-name { font-size:13px; font-weight:500; color:var(--text); line-height:1.3; }
.pagination { display:flex; align-items:center; justify-content:center; gap:4px; padding:28px 0 16px; flex-wrap:wrap; }
.page-btn { min-width:32px; height:32px; padding:0 8px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text-muted); cursor:pointer; font-family:'Inter',sans-serif; font-size:12px; font-weight:500; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
.page-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--text); }
.page-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
.page-btn:disabled { opacity:0.2; cursor:default; }
.no-results { text-align:center; padding:80px 20px; color:var(--text-muted); }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">⚔ Metin2<span>DB</span></div>
  <div class="nav-sep"></div>
  <a href="index.html" class="nav-link">GM Comenzi</a>
  <a href="items.html" class="nav-link">🎒 Iteme</a>
  <a href="mobs.html" class="nav-link active">👾 Mobi</a>
  <div class="nav-spacer"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ro')" id="btn-ro">RO</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
  </div>
</nav>
<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="search" placeholder="Caută după nume sau VNUM..." oninput="onSearch()" />
  </div>
  <div class="count-badge">Afișate: <b id="shown">0</b> / <b id="total">0</b></div>
</div>
<main>
  <div class="grid" id="grid"></div>
  <div id="no-results" class="no-results" style="display:none">Niciun mob găsit.</div>
  <div class="pagination" id="pagination"></div>
</main>
<script src="data.js"></script>
<script>
const PAGE_SIZE=150;let filtered=[],page=0,lang='ro';
document.getElementById('total').textContent=MOBS.length;
function setLang(l){lang=l;document.getElementById('btn-ro').classList.toggle('active',l==='ro');document.getElementById('btn-en').classList.toggle('active',l==='en');document.getElementById('search').placeholder=l==='ro'?'Caută după nume sau VNUM...':'Search by name or VNUM...';document.getElementById('no-results').textContent=l==='ro'?'Niciun mob găsit.':'No mobs found.';onSearch();}
function onSearch(){const q=document.getElementById('search').value.toLowerCase().trim();const k=lang==='ro'?'name_ro':'name_en';filtered=q?MOBS.filter(m=>m[k].toLowerCase().includes(q)||String(m.vnum).includes(q)):MOBS;page=0;render();}
function render(){
  const k=lang==='ro'?'name_ro':'name_en';
  document.getElementById('shown').textContent=filtered.length;
  const noRes=document.getElementById('no-results');const pagDiv=document.getElementById('pagination');
  if(!filtered.length){document.getElementById('grid').innerHTML='';noRes.style.display='block';pagDiv.innerHTML='';return;}
  noRes.style.display='none';
  document.getElementById('grid').innerHTML=filtered.slice(page*PAGE_SIZE,page*PAGE_SIZE+PAGE_SIZE).map(m=>`<div class="mob-card"><span class="mob-vnum">${m.vnum}</span><span class="mob-name">${m[k]}</span></div>`).join('');
  const total=Math.ceil(filtered.length/PAGE_SIZE);
  if(total<=1){pagDiv.innerHTML='';return;}
  const range=[];
  for(let i=0;i<total;i++){if(i===0||i===total-1||Math.abs(i-page)<=2)range.push(i);else if(range[range.length-1]!=='...')range.push('...');}
  pagDiv.innerHTML=`<button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>←</button>`+range.map(p=>p==='...'?`<span style="color:var(--text-dim);padding:0 4px;align-self:center">…</span>`:`<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p+1}</button>`).join('')+`<button class="page-btn" onclick="goPage(${page+1})" ${page===total-1?'disabled':''}>→</button>`;
}
function goPage(p){page=p;render();window.scrollTo({top:0,behavior:'smooth'});}
filtered=MOBS;render();
</script>
</body>
</html>
