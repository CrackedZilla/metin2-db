<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iteme — Metin2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070809;
  --surface: #0e1014;
  --surface2: #141619;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,165,0,0.3);
  --accent: #ff9500;
  --accent2: #ff6b00;
  --text: #e8eaed;
  --text-muted: #6b7280;
  --text-dim: #374151;
  --cmd: #60a5fa;
  --red: #ef4444;
  --glow: rgba(255,149,0,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,149,0,0.08), transparent);
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,8,9,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; align-items: center; height: 60px; gap: 8px;
}
.nav-logo {
  font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
  color: #fff; margin-right: 16px;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo span { color: var(--accent); }
.nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }
.nav-link {
  padding: 6px 14px; border-radius: 8px;
  color: var(--text-muted); text-decoration: none;
  font-size: 13px; font-weight: 500; transition: all 0.2s;
  border: 1px solid transparent;
}
.nav-link:hover { color: var(--text); background: var(--surface2); }
.nav-link.active {
  color: var(--accent); background: rgba(255,149,0,0.1);
  border-color: rgba(255,149,0,0.2);
}
.nav-spacer { flex: 1; }
.lang-toggle {
  display: flex; gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 3px;
}
.lang-btn {
  padding: 5px 14px; border: none; border-radius: 6px;
  background: transparent; color: var(--text-muted);
  cursor: pointer; font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  transition: all 0.2s;
}
.lang-btn.active { background: var(--accent); color: #000; }

/* SEARCH BAR */
.search-section {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; gap: 16px;
}
.search-wrap {
  position: relative; flex: 1; max-width: 480px;
}
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 16px 11px 42px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; outline: none;
  transition: all 0.2s;
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,149,0,0.08);
}
.search-input::placeholder { color: var(--text-dim); }
.count-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 8px;
  white-space: nowrap;
}
.count-badge b { color: var(--accent); font-weight: 600; }

/* GRID */
main { padding: 24px 32px 48px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
}
.item-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  transition: all 0.2s;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.item-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--glow), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.item-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.item-card:hover::before { opacity: 1; }
.item-vnum {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-dim);
  margin-bottom: 5px; letter-spacing: 0.5px;
}
.item-name {
  font-size: 14px; font-weight: 500;
  color: var(--cmd); line-height: 1.4;
}
.item-desc {
  font-size: 11px; color: var(--red);
  margin-top: 6px; line-height: 1.5;
  opacity: 0.85;
}

/* PAGINATION */
.pagination {
  display: flex; align-items: center;
  justify-content: center; gap: 4px;
  padding: 32px 0 16px; flex-wrap: wrap;
}
.page-btn {
  min-width: 36px; height: 36px; padding: 0 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-muted);
  cursor: pointer; font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.page-btn:disabled { opacity: 0.25; cursor: default; }

.no-results {
  text-align: center; padding: 80px 20px;
  color: var(--text-muted); font-size: 15px;
}
.no-results span { display: block; font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⚔ Metin2<span>DB</span></div>
  <div class="nav-sep"></div>
  <a href="index.html" class="nav-link">GM Comenzi</a>
  <a href="items.html" class="nav-link active">🎒 Iteme</a>
  <a href="mobs.html" class="nav-link">👾 Mobi</a>
  <div class="nav-spacer"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ro')" id="btn-ro">RO</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
  </div>
</nav>

<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="search" placeholder="Caută după nume sau VNUM..." oninput="onSearch()" />
  </div>
  <div class="count-badge">Afișate: <b id="shown">0</b> / <b id="total">0</b></div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div id="no-results" class="no-results" style="display:none">
    <span>🔍</span>Niciun item găsit.
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<script src="data.js"></script>
<script>
const PAGE_SIZE = 120;
let filtered = [], page = 0, lang = 'ro';

document.getElementById('total').textContent = ITEMS.length;

function setLang(l) {
  lang = l;
  document.getElementById('btn-ro').classList.toggle('active', l==='ro');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('search').placeholder = l==='ro' ? 'Caută după nume sau VNUM...' : 'Search by name or VNUM...';
  document.querySelector('#no-results').innerHTML = l==='ro' ? '<span>🔍</span>Niciun item găsit.' : '<span>🔍</span>No items found.';
  onSearch();
}

function onSearch() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const k = lang==='ro' ? 'name_ro' : 'name_en';
  filtered = q ? ITEMS.filter(i => i[k].toLowerCase().includes(q) || String(i.vnum).includes(q)) : ITEMS;
  page = 0; render();
}

function render() {
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');
  const pagDiv = document.getElementById('pagination');
  const k = lang==='ro' ? 'name_ro' : 'name_en';

  document.getElementById('shown').textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = ''; noRes.style.display = 'block'; pagDiv.innerHTML = ''; return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.slice(page*PAGE_SIZE, page*PAGE_SIZE+PAGE_SIZE).map(i => `
    <div class="item-card">
      <div class="item-vnum">#${i.vnum}</div>
      <div class="item-name">${i[k]}</div>
      ${i.desc ? `<div class="item-desc">${i.desc}</div>` : ''}
    </div>
  `).join('');

  const total = Math.ceil(filtered.length/PAGE_SIZE);
  if (total<=1) { pagDiv.innerHTML=''; return; }

  const range = [];
  for (let i=0; i<total; i++) {
    if (i===0||i===total-1||Math.abs(i-page)<=2) range.push(i);
    else if (range[range.length-1]!=='...') range.push('...');
  }

  pagDiv.innerHTML = `<button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>←</button>`
    + range.map(p => p==='...' ? `<span style="color:var(--text-dim);padding:0 4px;align-self:center">…</span>`
      : `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p+1}</button>`).join('')
    + `<button class="page-btn" onclick="goPage(${page+1})" ${page===total-1?'disabled':''}>→</button>`;
}

function goPage(p) { page=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }
filtered = ITEMS; render();
</script>
</body>
</html>
