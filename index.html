<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Commands - Metin2</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #0f1218;
    --bg3: #151a22;
    --border: #1e2a3a;
    --accent: #e8a020;
    --accent2: #c06010;
    --text: #c8d8e8;
    --text-dim: #5a7090;
    --cmd: #7ecfff;
    --green: #40c080;
    --red: #e05050;
    --yellow: #e8c040;
    --purple: #a070e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0d1420 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* LANG TOGGLE */
  .lang-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .lang-btn {
    padding: 8px 20px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: var(--accent);
    color: #000;
  }

  .lang-btn:hover:not(.active) {
    background: var(--bg3);
    color: var(--text);
  }

  /* SEARCH */
  .search-bar {
    padding: 20px 40px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width: 100%;
    max-width: 500px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 16px 10px 42px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    position: relative;
  }

  .search-wrapper {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 500px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder { color: var(--text-dim); }

  /* MAIN LAYOUT */
  .container {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 130px);
  }

  /* SIDEBAR */
  nav {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 73px;
    height: calc(100vh - 73px);
    overflow-y: auto;
  }

  nav::-webkit-scrollbar { width: 4px; }
  nav::-webkit-scrollbar-track { background: transparent; }
  nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nav-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 20px 10px;
    margin-top: 16px;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    cursor: pointer;
  }

  .nav-link:hover {
    color: var(--text);
    background: var(--bg3);
    border-left-color: var(--border);
  }

  .nav-link.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(232, 160, 32, 0.06);
  }

  .nav-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
  }

  /* CONTENT */
  main {
    padding: 32px 40px;
    overflow-y: auto;
  }

  .section {
    margin-bottom: 48px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    font-size: 22px;
  }

  .section-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }

  .section-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg3);
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    margin-left: auto;
  }

  /* COMMAND TABLE */
  .cmd-table {
    width: 100%;
    border-collapse: collapse;
  }

  .cmd-row {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .cmd-row:hover {
    background: var(--bg3);
  }

  .cmd-row:last-child {
    border-bottom: none;
  }

  .cmd-row td {
    padding: 11px 14px;
    vertical-align: top;
  }

  .cmd-syntax {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--cmd);
    white-space: nowrap;
    width: 1%;
  }

  .cmd-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .cmd-level {
    text-align: right;
    white-space: nowrap;
    width: 1%;
  }

  .level-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .level-LOW_WIZARD { color: var(--green); border-color: rgba(64,192,128,0.3); background: rgba(64,192,128,0.06); }
  .level-WIZARD { color: var(--yellow); border-color: rgba(232,192,64,0.3); background: rgba(232,192,64,0.06); }
  .level-HIGH_WIZARD { color: #ff9040; border-color: rgba(255,144,64,0.3); background: rgba(255,144,64,0.06); }
  .level-GOD { color: var(--red); border-color: rgba(224,80,80,0.3); background: rgba(224,80,80,0.06); }
  .level-IMPLEMENTOR { color: var(--purple); border-color: rgba(160,112,224,0.3); background: rgba(160,112,224,0.06); }

  .cmd-param {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
  }

  .cmd-optional {
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    padding: 16px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 15px;
    letter-spacing: 1px;
  }

  .cmd-table-wrapper {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
</style>
</head>
<body>

<div class="container">

let currentLang = 'ro';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-ro').classList.toggle('active', lang === 'ro');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('search').placeholder = lang === 'ro' ? 'Caută o comandă...' : 'Search a command...';

  // Update all data-ro/data-en elements
  document.querySelectorAll('[data-ro]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });

  renderSections(document.getElementById('search').value);
}

function levelLabel(level, lang) {
  const map = {
    LOW_WIZARD: { ro: 'Low Wizard', en: 'Low Wizard' },
    WIZARD: { ro: 'Wizard', en: 'Wizard' },
    HIGH_WIZARD: { ro: 'High Wizard', en: 'High Wizard' },
    GOD: { ro: 'God', en: 'God' },
    IMPLEMENTOR: { ro: 'Implementor', en: 'Implementor' },
  };
  return map[level]?.[lang] || level;
}

function renderSections(filter = '') {
  const sections = document.getElementById('sections');
  const noResults = document.getElementById('no-results');
  const sidebar = document.getElementById('sidebar');
  const q = filter.toLowerCase();

  sections.innerHTML = '';
  sidebar.innerHTML = `<div class="nav-label" data-ro="Categorii" data-en="Categories">${currentLang === 'ro' ? 'Categorii' : 'Categories'}</div>`;

  let totalVisible = 0;

  data.categories.forEach(cat => {
    const filtered = q
      ? cat.commands.filter(c =>
          c.syntax.toLowerCase().includes(q) ||
          c[currentLang].toLowerCase().includes(q)
        )
      : cat.commands;

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    // Nav link
    const link = document.createElement('div');
    link.className = 'nav-link';
    link.innerHTML = `${cat.icon} ${cat[currentLang]} <span class="nav-count">${filtered.length}</span>`;
    link.onclick = () => {
      document.getElementById('sec-' + cat.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    sidebar.appendChild(link);

    // Section
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-' + cat.id;

    sec.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${cat.icon}</span>
        <span class="section-title">${cat[currentLang]}</span>
        <span class="section-count">${filtered.length} cmd</span>
      </div>
      <div class="cmd-table-wrapper">
        <table class="cmd-table">
          ${filtered.map(cmd => `
            <tr class="cmd-row">
              <td class="cmd-syntax">${cmd.syntax}</td>
              <td class="cmd-desc">${cmd[currentLang]}</td>
              <td class="cmd-level"><span class="level-badge level-${cmd.level}">${levelLabel(cmd.level, currentLang)}</span></td>
            </tr>
          `).join('')}
        </table>
      </div>
    `;

    sections.appendChild(sec);
  });

  noResults.classList.toggle('hidden', totalVisible > 0);
  noResults.textContent = currentLang === 'ro' ? 'Nicio comandă găsită.' : 'No commands found.';
}

function filterCommands() {
  renderSections(document.getElementById('search').value);
}

renderSections();
