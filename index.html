<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metin2 DB</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0f; --surface:#0d1117; --surface2:#1a212b;
  --border:rgba(255,255,255,0.07); --border-hover:rgba(0,200,255,0.3);
  --accent:#00c8ff; --accent-dim:rgba(0,200,255,0.1);
  --text:#ffffff; --text-soft:#e8edf2; --text-muted:#9aa5b1; --text-dim:#4a5568;
  --cmd:#00c8ff;
  --green:#3fb950; --yellow:#d29922; --orange:#f0883e; --red:#f85149; --purple:#bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; min-height:100vh; background-image:radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,200,255,0.05), transparent); }

nav { position:sticky; top:0; z-index:100; background:rgba(8,10,15,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; height:56px; gap:6px; }
.nav-logo { font-size:16px; font-weight:700; color:#fff; margin-right:12px; display:flex; align-items:center; gap:6px; letter-spacing:-0.3px; }
.nav-logo span { color:var(--accent); }
.nav-sep { width:1px; height:16px; background:var(--border); margin:0 6px; }
.nav-link { padding:5px 12px; border-radius:6px; color:var(--text-muted); text-decoration:none; font-size:13px; font-weight:500; transition:all 0.15s; border:1px solid transparent; }
.nav-link:hover { color:var(--text); background:var(--surface2); }
.nav-link.active { color:var(--accent); background:var(--accent-dim); border-color:rgba(0,200,255,0.2); }
.nav-spacer { flex:1; }
.lang-toggle { display:flex; gap:2px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:2px; }
.lang-btn { padding:4px 12px; border:none; border-radius:4px; background:transparent; color:var(--text); cursor:pointer; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.5px; transition:all 0.2s; }
.lang-btn.active { background:var(--accent); color:#000; }

.search-section { padding:20px 24px 16px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:12px; }
.search-wrap { position:relative; flex:1; max-width:440px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; font-size:13px; }
.search-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 14px 9px 36px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; outline:none; transition:all 0.2s; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,200,255,0.08); }
.search-input::placeholder { color:var(--text-dim); }
.count-badge { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); padding:5px 10px; border-radius:6px; }
.count-badge b { color:var(--accent); }

.layout { display:grid; grid-template-columns:190px 1fr; min-height:calc(100vh - 100px); }

aside { background:var(--surface); border-right:1px solid var(--border); padding:16px 0; position:sticky; top:56px; height:calc(100vh - 56px); overflow-y:auto; }
aside::-webkit-scrollbar { width:3px; }
aside::-webkit-scrollbar-thumb { background:var(--border); }
.sidebar-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); padding:0 14px 6px; margin-top:12px; font-weight:600; }
.sidebar-link { display:flex; align-items:center; gap:7px; padding:7px 14px; color:var(--text-soft); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.12s; border-left:2px solid transparent; }
.sidebar-link:hover { color:var(--text); background:rgba(255,255,255,0.03); }
.sidebar-link.active { color:var(--accent); border-left-color:var(--accent); background:var(--accent-dim); }
.sidebar-count { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent); }

main { padding:24px 28px 60px; }

.legend { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-soft); }

.section { margin-bottom:36px; scroll-margin-top:80px; }
.section-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.section-icon { font-size:18px; }
.section-title { font-size:15px; font-weight:600; color:var(--text); }
.section-count { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent); background:var(--surface2); padding:2px 7px; border-radius:4px; border:1px solid var(--border); }

.cmd-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.cmd-table { width:100%; border-collapse:collapse; }
.cmd-row { border-bottom:1px solid var(--border); transition:background 0.12s; }
.cmd-row:last-child { border-bottom:none; }
.cmd-row { cursor:pointer; } .cmd-row:hover { background:var(--surface2); } .cmd-row.copied { background:var(--accent-dim); } .cmd-row.copied .cmd-syntax { color:#fff; }
.cmd-row td { padding:9px 14px; vertical-align:middle; }
.cmd-syntax { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--cmd); white-space:nowrap; width:1%; }
.cmd-desc { font-size:13px; color:var(--text); line-height:1.5; }
.cmd-level { text-align:right; width:1%; white-space:nowrap; }

.badge { font-family:'JetBrains Mono',monospace; font-size:10px; padding:2px 7px; border-radius:4px; border:1px solid; font-weight:500; }
.badge-LOW_WIZARD { color:var(--green); border-color:rgba(63,185,80,0.3); background:rgba(63,185,80,0.08); }
.badge-WIZARD { color:var(--yellow); border-color:rgba(210,153,34,0.3); background:rgba(210,153,34,0.08); }
.badge-HIGH_WIZARD { color:var(--orange); border-color:rgba(240,136,62,0.3); background:rgba(240,136,62,0.08); }
.badge-GOD { color:var(--red); border-color:rgba(248,81,73,0.3); background:rgba(248,81,73,0.08); }
.badge-IMPLEMENTOR { color:var(--purple); border-color:rgba(188,140,255,0.3); background:rgba(188,140,255,0.08); }

.no-results { text-align:center; padding:60px; color:var(--text-muted); font-size:14px; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--accent); color:#000; font-weight:600; font-size:13px; padding:10px 20px; border-radius:8px; box-shadow:0 8px 24px rgba(0,200,255,0.3); transition:transform 0.3s cubic-bezier(0.2,0.9,0.3,1.2); z-index:200; font-family:'JetBrains Mono',monospace; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">⚔ Metin2<span>DB</span></div>
  <div class="nav-sep"></div>
  <a href="index.html" class="nav-link active" id="nav-cmd">Comenzi GM</a>
  <a href="items.html" class="nav-link" id="nav-items">💎 Iteme</a>
  <a href="mobs.html" class="nav-link" id="nav-mobs">👾 Mobi</a>
  <div class="nav-spacer"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ro')" id="btn-ro">RO</button>

</nav>
<div class="search-section">

    <span class="search-icon">🔍</span>

  <aside id="sidebar"></aside>
  <main id="main-content">

      <div class="legend-item"><span class="badge badge-HIGH_WIZARD">High Wizard</span> <span id="leg3">GM avansat</span></div>
      <div class="legend-item"><span class="badge badge-GOD">God</span> <span id="leg4">Admin</span></div>
      <div class="legend-item"><span class="badge badge-IMPLEMENTOR">Implementor</span> <span id="leg5">Super Admin</span></div>
    </div>
    <div id="sections"></div>
    <div id="no-results" class="no-results" style="display:none"></div>
  </main>
</div>

    {syntax:"/eclipse", ro:"Activeaza/dezactiveaza eclipsa", en:"Toggle eclipse effect", level:"HIGH_WIZARD"},
    {syntax:"/banner <mesaj>", ro:"Afiseaza un banner pe server", en:"Display server banner", level:"HIGH_WIZARD"},
    {syntax:"/set <nume> <camp> <val>", ro:"Seteaza o valoare pentru un jucator", en:"Set a value for a player", level:"IMPLEMENTOR"},
  ]},
]};

let currentLang='ro';

function setLang(lang){
  currentLang=lang;
  document.getElementById('nav-cmd').textContent=lang==='ro'?'GM Comenzi':'GM Commands';
  document.getElementById('nav-items').textContent=lang==='ro'?'💎 Iteme':'💎 Items';
  document.getElementById('nav-mobs').textContent=lang==='ro'?'👾 Mobi':'👾 Mobs';
  document.getElementById('btn-ro').classList.toggle('active',lang==='ro');
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  document.getElementById('search').placeholder=LANG[lang].search;
  LANG[lang].leg.forEach((t,i)=>document.getElementById('leg'+(i+1)).textContent=t);
  renderSections(document.getElementById('search').value);
}

function filterCommands(){renderSections(document.getElementById('search').value);}

function renderSections(filter=''){
  const sections=document.getElementById('sections');
  const noResults=document.getElementById('no-results');
  const sidebar=document.getElementById('sidebar');
  const q=filter.toLowerCase();
  let total=0;
  sections.innerHTML='';
  sidebar.innerHTML=`<div class="sidebar-label">${LANG[currentLang].cats}</div>`;

  data.categories.forEach(cat=>{
    const filtered=q?cat.commands.filter(c=>c.syntax.toLowerCase().includes(q)||c[currentLang].toLowerCase().includes(q)):cat.commands;
    if(!filtered.length)return;
    total+=filtered.length;

    const link=document.createElement('div');
    link.className='sidebar-link';
    link.innerHTML=`${cat.icon} ${cat[currentLang]} <span class="sidebar-count">${filtered.length}</span>`;
    link.onclick=()=>{document.querySelectorAll('.sidebar-link').forEach(s=>s.classList.remove('active'));link.classList.add('active');document.getElementById('sec-'+cat.id)?.scrollIntoView({behavior:'smooth',block:'start'});};
    sidebar.appendChild(link);

    const sec=document.createElement('div');
    sec.className='section'; sec.id='sec-'+cat.id;
    sec.innerHTML=`
      <div class="section-header">
        <span class="section-icon">${cat.icon}</span>
        <span class="section-title">${cat[currentLang]}</span>
        <span class="section-count">${filtered.length}</span>
      </div>
      <div class="cmd-table-wrap">
        <table class="cmd-table">
          ${filtered.map(cmd=>`
            <tr class="cmd-row" data-cmd="${cmd.syntax.split(' ')[0]}">
              <td class="cmd-syntax">${cmd.syntax}</td>
              <td class="cmd-desc">${cmd[currentLang]}</td>
              <td class="cmd-level"><span class="badge badge-${cmd.level}">${cmd.level.replace(/_/g,' ')}</span></td>
            </tr>`).join('')}
        </table>
      </div>`;
    sections.appendChild(sec);
  });

  document.getElementById('shown').textContent=total;
  noResults.style.display=total?'none':'block';
  noResults.textContent=LANG[currentLang].noResults;
}

renderSections();
</script>
<div class="toast" id="toast"></div>
<script>
document.addEventListener('click',e=>{const r=e.target.closest('.cmd-row');if(!r)return;const cmd=r.dataset.cmd;navigator.clipboard.writeText(cmd);r.classList.add('copied');setTimeout(()=>r.classList.remove('copied'),600);const el=document.getElementById('toast');el.textContent=cmd+' copiat!';el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1400);});
</script>
</body>
</html>
