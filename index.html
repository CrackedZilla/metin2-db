<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Commands — Metin2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070809;
  --surface: #0e1014;
  --surface2: #141619;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,149,0,0.25);
  --accent: #ff9500;
  --text: #e8eaed;
  --text-muted: #6b7280;
  --text-dim: #374151;
  --cmd: #60a5fa;
  --green: #34d399;
  --yellow: #fbbf24;
  --orange: #f97316;
  --red: #f87171;
  --purple: #a78bfa;
  --glow: rgba(255,149,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 15px; min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,149,0,0.07), transparent);
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,8,9,0.88); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px; display: flex; align-items: center; height: 60px; gap: 8px;
}
.nav-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #fff; margin-right: 16px; display: flex; align-items: center; gap: 8px; }
.nav-logo span { color: var(--accent); }
.nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }
.nav-link { padding: 6px 14px; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; border: 1px solid transparent; }
.nav-link:hover { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--accent); background: rgba(255,149,0,0.1); border-color: rgba(255,149,0,0.2); }
.nav-spacer { flex: 1; }
.lang-toggle { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
.lang-btn { padding: 5px 14px; border: none; border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; transition: all 0.2s; }
.lang-btn.active { background: var(--accent); color: #000; }

/* SEARCH */
.search-section {
  padding: 24px 32px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; align-items: center; gap: 16px;
}
.search-wrap { position: relative; flex: 1; max-width: 480px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px 11px 42px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; transition: all 0.2s; }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,149,0,0.08); }
.search-input::placeholder { color: var(--text-dim); }
.count-badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; white-space: nowrap; }
.count-badge b { color: var(--accent); }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 120px); }

/* SIDEBAR */
aside {
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 20px 0; position: sticky; top: 60px;
  height: calc(100vh - 60px); overflow-y: auto;
}
aside::-webkit-scrollbar { width: 3px; }
aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); padding: 0 16px 8px; margin-top: 16px; }
.sidebar-link {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; color: var(--text-muted);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; border-left: 2px solid transparent;
}
.sidebar-link:hover { color: var(--text); background: var(--surface2); }
.sidebar-link.active { color: var(--accent); border-left-color: var(--accent); background: rgba(255,149,0,0.05); }
.sidebar-count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }

/* MAIN */
main { padding: 28px 32px 60px; overflow-y: auto; }

/* LEGEND */
.legend {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 28px; padding: 14px 18px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px;
}
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); }

/* SECTIONS */
.section { margin-bottom: 40px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-icon { font-size: 20px; }
.section-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
.section-count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); background: var(--surface2); padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); }

/* TABLE */
.cmd-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.cmd-table { width: 100%; border-collapse: collapse; }
.cmd-row { border-bottom: 1px solid var(--border); transition: background 0.15s; }
.cmd-row:last-child { border-bottom: none; }
.cmd-row:hover { background: var(--surface2); }
.cmd-row td { padding: 10px 16px; vertical-align: middle; }
.cmd-syntax { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--cmd); white-space: nowrap; width: 1%; }
.cmd-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
.cmd-level { text-align: right; width: 1%; white-space: nowrap; }

.badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 3px 8px; border-radius: 5px; border: 1px solid;
  letter-spacing: 0.5px; font-weight: 500;
}
.badge-LOW_WIZARD { color: var(--green); border-color: rgba(52,211,153,0.25); background: rgba(52,211,153,0.07); }
.badge-WIZARD { color: var(--yellow); border-color: rgba(251,191,36,0.25); background: rgba(251,191,36,0.07); }
.badge-HIGH_WIZARD { color: var(--orange); border-color: rgba(249,115,22,0.25); background: rgba(249,115,22,0.07); }
.badge-GOD { color: var(--red); border-color: rgba(248,113,113,0.25); background: rgba(248,113,113,0.07); }
.badge-IMPLEMENTOR { color: var(--purple); border-color: rgba(167,139,250,0.25); background: rgba(167,139,250,0.07); }

.no-results { text-align: center; padding: 80px; color: var(--text-muted); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⚔ Metin2<span>DB</span></div>
  <div class="nav-sep"></div>
  <a href="index.html" class="nav-link active">GM Comenzi</a>
  <a href="items.html" class="nav-link">🎒 Iteme</a>
  <a href="mobs.html" class="nav-link">👾 Mobi</a>

  <div class="lang-toggle">

<div class="search-section">

    </div>
    <div id="sections"></div>

      {syntax:"/cannot_dead", ro:"Dezactivează posibilitatea de a muri", en:"Disable ability to die (god mode)", level:"LOW_WIZARD"},
      {syntax:"/safebox <marime>", ro:"Setează mărimea safeboxului (0-3)", en:"Set safebox size (0-3)", level:"HIGH_WIZARD"},
      {syntax:"/break_marriage", ro:"Rupe căsătoria unui jucător", en:"Break a player's marriage", level:"LOW_WIZARD"},
      {syntax:"/eclipse", ro:"Activează/dezactivează eclipsa", en:"Toggle eclipse effect", level:"HIGH_WIZARD"},
      {syntax:"/banner <mesaj>", ro:"Afișează un banner pe server", en:"Display server banner", level:"HIGH_WIZARD"},
      {syntax:"/set <nume> <camp> <val>", ro:"Setează o valoare pentru un jucător", en:"Set a value for a player", level:"IMPLEMENTOR"},
    ]},
  ]
};

let currentLang = 'ro';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-ro').classList.toggle('active', lang==='ro');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('search').placeholder = LANG[lang].search;
  const legs = LANG[lang].leg;
  for (let i=1;i<=5;i++) document.getElementById('leg'+i).textContent = legs[i-1];
  renderSections(document.getElementById('search').value);
}

function filterCommands() { renderSections(document.getElementById('search').value); }

function renderSections(filter='') {
  const sections = document.getElementById('sections');
  const noResults = document.getElementById('no-results');
  const sidebar = document.getElementById('sidebar');
  const q = filter.toLowerCase();
  let total = 0;

  sections.innerHTML = '';
  sidebar.innerHTML = `<div class="sidebar-label">${LANG[currentLang].categories}</div>`;

  data.categories.forEach(cat => {
    const filtered = q
      ? cat.commands.filter(c => c.syntax.toLowerCase().includes(q) || c[currentLang].toLowerCase().includes(q))
      : cat.commands;
    if (!filtered.length) return;
    total += filtered.length;

    const link = document.createElement('div');
    link.className = 'sidebar-link';
    link.innerHTML = `${cat.icon} ${cat[currentLang]} <span class="sidebar-count">${filtered.length}</span>`;
    link.onclick = () => document.getElementById('sec-'+cat.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    sidebar.appendChild(link);

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-'+cat.id;
    sec.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${cat.icon}</span>
        <span class="section-title">${cat[currentLang]}</span>
        <span class="section-count">${filtered.length}</span>
      </div>
      <div class="cmd-table-wrap">
        <table class="cmd-table">
          ${filtered.map(cmd => `
            <tr class="cmd-row">
              <td class="cmd-syntax">${cmd.syntax}</td>
              <td class="cmd-desc">${cmd[currentLang]}</td>
              <td class="cmd-level"><span class="badge badge-${cmd.level}">${cmd.level.replace('_',' ')}</span></td>
            </tr>
          `).join('')}
        </table>
      </div>`;
    sections.appendChild(sec);
  });

  document.getElementById('shown').textContent = total;
  noResults.style.display = total ? 'none' : 'block';
  noResults.textContent = LANG[currentLang].noResults;
}

renderSections();
</script>
</body>
</html>
